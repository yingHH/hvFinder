[SSH]
host = example.com
port = 22
user = user
pwd = 000000
base = /path/to/your/project

[PIPELINE]
fq1 = /path/to/input_1.fq
fq2 = /path/to/input_2.fq
run_mode = Slurm (srun)

[ADVANCED]
global.threads = 64
global.tmp_dir_suffix = _tmp
fastp.bin = fastp
bowtie2.bin = bowtie2
bowtie2.params.index_path = /path/to/host_idx
samtools.bin = samtools
ribodetector.bin = /path/to/ribodetector_cpu
ribodetector.params.len = 149
ribodetector.params.enzyme = rrna
ribodetector.params.chunk_size = 256
megahit.bin = /path/to/megahit
megahit.params.force = True
cdhit.bin = /path/to/cdhit-est
cdhit.params.memory_limit = 200000
diamond.bin = /path/to/diamond
diamond.db_path = /path/to/diamond_db
diamond.params.sensitivity = --sensitive
diamond.params.evalue = 1e-5
diamond.params.max_target_seqs = 10
diamond.params.outfmt = 6 qseqid sseqid qcovhsp pident qlen slen length qstart qend sstart send evalue staxids sscinames sskingdoms

[PATHOGEN]
taxid_file = /path/to/virus_2_taxid/file
virus_index = /path/to/high-pathetic/database
run_mode = Slurm (srun)
output_folder = pathogen_results
diamond_pident = 80
diamond_qcov = 50
diamond_evalue = 1e-10
bowtie2_index_path = 
bowtie2_identity = 90
bowtie2_coverage = 70
bowtie2_threads = 64

